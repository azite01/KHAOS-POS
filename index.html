<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KHAOS POS | Enterprise</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.mini.min.js"></script>

    <style>
        /* --- 1. DESIGN SYSTEM --- */
        :root {
            --bg-body: #f8fafc;
            --sidebar-bg: #0f172a;
            --sidebar-text: #94a3b8;
            --sidebar-active: #38bdf8;
            --topbar-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --accent: #38bdf8;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Themes */
        body.theme-emerald { --sidebar-bg: #064e3b; --sidebar-active: #34d399; --accent: #10b981; }
        body.theme-purple { --sidebar-bg: #2e1065; --sidebar-active: #a78bfa; --accent: #8b5cf6; }
        body.theme-crimson { --sidebar-bg: #450a0a; --sidebar-active: #f87171; --accent: #ef4444; }
        body.theme-dark { --bg-body: #111; --topbar-bg: #1a1a1a; --text-main: #eee; --border: #333; --sidebar-bg: #000; --card-bg: #1a1a1a; --text-muted: #888; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        /* FIX: Dynamic Height and Safe Area Insets */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            height: 100dvh; /* Dynamic viewport height for mobile */
            display: flex; 
            flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* --- 2. LAYOUT --- */
        .wrapper { display: flex; width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            display: flex; 
            flex-direction: column; 
            transition: 0.3s; 
            z-index: 1000; 
            flex-shrink: 0; 
        }
        
        .logo-area { height: 70px; display: flex; align-items: center; justify-content: center; font-family: 'Anton', sans-serif; font-size: 28px; letter-spacing: 2px; color: white; background: rgba(0,0,0,0.2); }
        .menu { list-style: none; padding: 20px 0; margin: 0; flex: 1; overflow-y: auto; }
        .menu a { display: flex; align-items: center; padding: 16px 25px; color: var(--sidebar-text); text-decoration: none; font-size: 14px; transition: 0.2s; gap: 15px; font-weight: 500; border-right: 3px solid transparent; }
        .menu a:hover, .menu a.active { background: rgba(255,255,255,0.05); color: white; border-right-color: var(--sidebar-active); }
        
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; width: 100%; }
        .topbar { min-height: 70px; background: var(--topbar-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-shadow: var(--shadow); }
        .page-content { padding: 20px; overflow-y: auto; flex: 1; }

        /* --- 3. COMPONENTS --- */
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; }
        
        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .kpi-val { font-size: 20px; font-weight: 700; color: var(--text-main); margin: 0; }
        .kpi-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-top: 3px; }
        .kpi-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--bg-body); color: var(--accent); }

        /* POS Layout */
        .pos-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; height: 100%; }
        
        /* Table */
        .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--card-bg); width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 500px; }
        th { text-align: left; padding: 12px 15px; background: var(--bg-body); color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); color: var(--text-main); }
        
        /* Buttons */
        .btn { padding: 14px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; width: 100%; }
        .btn-primary { background: var(--sidebar-bg); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-light { background: #f1f5f9; color: var(--text-main); border: 1px solid var(--border); }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        input, select { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); color: var(--text-main); font-size: 15px; }

        /* Login Screen */
        #screen-login { position: fixed; inset: 0; background: var(--sidebar-bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 380px; text-align: center; }

        /* Mobile Adjustments - FIX FOR CRASHING EDGES */
        @media (max-width: 900px) {
            .pos-grid { grid-template-columns: 1fr; overflow-y: auto; display: block; }
            .pos-grid .card { margin-bottom: 20px; }
            .topbar { padding: 0 10px; }
            .page-content { padding: 15px; }
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; height: 100%; box-shadow: 10px 0 20px rgba(0,0,0,0.2); }
            .sidebar.active { transform: translateX(260px); }
            .sidebar-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900; display: none; }
            .sidebar-backdrop.active { display: block; }
            .menu-toggle { display: block; font-size: 22px; margin-right: 15px; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="screen-login">
        <div class="login-box">
            <h1 style="font-family:'Anton'; font-size:48px; margin:0; color:#0f172a;">KHAOS</h1>
            <p style="color:#64748b; margin-bottom:30px; font-size:14px;">Enterprise Point of Sale</p>
            
            <div class="input-group">
                <select id="login-user">
                    <option value="" disabled selected>Select User</option>
                    <option value="Gayan Poorna">Gayan Poorna</option>
                    <option value="Asitha Sahanpriya">Asitha Sahanpriya</option>
                    <option value="Temp-cashier">Temp-cashier</option>
                </select>
            </div>
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Access Key">
            </div>
            <button class="btn btn-primary" onclick="Auth.login()">LOGIN ACCESS</button>
            <div style="margin-top:25px; font-size:11px; color:#94a3b8;">© 2026 Asitha</div>
        </div>
    </div>

    <div class="wrapper">
        <div class="sidebar-backdrop" onclick="Nav.toggleSidebar()"></div>

        <div class="sidebar">
            <div class="logo-area">KHAOS POS</div>
            <ul class="menu">
                <li><a href="#" class="active" onclick="Nav.go('dashboard', this)"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="#" onclick="Nav.go('pos', this)"><i class="fas fa-calculator"></i> POS Terminal</a></li>
                <li><a href="#" onclick="Nav.go('reports', this)"><i class="fas fa-table"></i> Reports</a></li>
                <li><a href="#" onclick="Nav.go('settings', this)"><i class="fas fa-cog"></i> Settings</a></li>
                <li style="margin-top:auto;"><a href="#" onclick="Auth.logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="topbar">
                <div class="menu-toggle" onclick="Nav.toggleSidebar()"><i class="fas fa-bars"></i></div>
                <div style="flex:1;"></div>
                <div style="text-align:right; margin-right:12px;">
                    <div style="font-weight:700; font-size:13px;" id="user-display">Admin</div>
                    <div style="font-size:10px; color:var(--text-muted);" id="live-clock">--:--</div>
                </div>
                <div id="user-avatar" style="width:35px; height:35px; background:var(--sidebar-active); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:14px;">K</div>
            </div>

            <div id="view-dashboard" class="page-content">
                <div class="grid-kpi">
                    <div class="kpi-card">
                        <div><p class="kpi-val" id="kpi-sales">0.00</p><p class="kpi-lbl">Sales</p></div>
                        <div class="kpi-icon"><i class="fas fa-coins"></i></div>
                    </div>
                    <div class="kpi-card">
                        <div><p class="kpi-val" id="kpi-orders">0</p><p class="kpi-lbl">Orders</p></div>
                        <div class="kpi-icon"><i class="fas fa-receipt"></i></div>
                    </div>
                </div>
                <div class="card"><canvas id="salesChart" style="height:250px;"></canvas></div>
            </div>

            <div id="view-pos" class="page-content hidden">
                <div class="pos-grid">
                    <div class="card">
                        <h3 style="margin-top:0;">Billing</h3>
                        <div class="input-group">
                            <select id="country-code" style="width:100px;"><option value="94">🇱🇰 +94</option></select>
                            <input type="tel" id="pos-phone" placeholder="WhatsApp Number" inputmode="numeric">
                        </div>
                        <button class="btn btn-primary" onclick="Cloud.recordSale()"><i class="fas fa-cloud-upload-alt"></i> RECORD TO LEDGER</button>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                            <button class="btn btn-success" style="background:#25D366;" onclick="IO.shareWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                            <button class="btn btn-light" onclick="IO.saveBill('png')"><i class="fas fa-download"></i> Save PNG</button>
                        </div>
                    </div>

                    <div class="card" id="receipt-container" style="padding:0; background:white;">
                        <div id="receipt-capture" style="padding:20px; font-family:'Space Mono', monospace; color:black;">
                            <div style="text-align:center; font-weight:700; font-size:22px;">KHAOS</div>
                            <div style="text-align:center; font-size:10px; margin-bottom:10px;">Biyagama, Sri Lanka</div>
                            <hr style="border:0; border-top:1px dashed #000;">
                            <div style="font-size:11px; display:flex; justify-content:space-between; margin:5px 0;">
                                <span id="bill-date"></span><span id="bill-time"></span>
                            </div>
                            <div style="font-size:11px;">Customer: <span id="bill-cust">Guest</span></div>
                            <hr style="border:0; border-top:1px dashed #000;">
                            <table style="width:100%; font-size:12px; min-width:unset; background:white;">
                                <tbody id="item-list">
                                    <tr>
                                        <td contenteditable="true">Item</td>
                                        <td contenteditable="true" style="text-align:center">1</td>
                                        <td contenteditable="true" style="text-align:right">2500</td>
                                    </tr>
                                </tbody>
                            </table>
                            <button onclick="App.addRow()" style="width:100%; border:1px dashed #999; background:none; padding:5px; margin-top:10px; cursor:pointer;" data-html2canvas-ignore="true">+ Add Item</button>
                            <div style="margin-top:15px; font-weight:700; font-size:18px; display:flex; justify-content:space-between; border-top:2px solid #000; padding-top:10px;">
                                <span>TOTAL</span><span id="grand-total">2,500.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-reports" class="page-content hidden">
                <h2>Reports</h2>
                <div class="table-wrap">
                    <table id="report-table">
                        <thead><tr><th>Date</th><th>Customer</th><th>Total</th></tr></thead>
                        <tbody id="report-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-settings" class="page-content hidden">
                <h2>Settings</h2>
                <div class="card">
                    <h4>Theme</h4>
                    <button class="btn btn-light" onclick="UI.setTheme('dark')">Dark Mode</button>
                    <button class="btn btn-light" onclick="UI.setTheme('default')" style="margin-top:10px;">Light Mode</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const Config = {
            scriptURL: "https://script.google.com/macros/s/AKfycbyZCDct1oFcVWizFVnI3d547WvkJnhKuzTi2NqhDNF22N2gNPoDk47fu6QkR0xkGIHw/exec",
            users: { "Gayan Poorna": "ngpkumara", "Asitha Sahanpriya": "paskumarasiri", "Temp-cashier": "temp" },
            codes: { "Gayan Poorna": "GP", "Asitha Sahanpriya": "AS", "Temp-cashier": "Temp" }
        };

        const Nav = {
            go(view, el) {
                document.querySelectorAll('.page-content').forEach(d => d.classList.add('hidden'));
                document.getElementById('view-' + view).classList.remove('hidden');
                document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
                if(el) el.classList.add('active');
                if(window.innerWidth < 768) this.toggleSidebar();
            },
            toggleSidebar() {
                document.querySelector('.sidebar').classList.toggle('active');
                document.querySelector('.sidebar-backdrop').classList.toggle('active');
            }
        };

        const Auth = {
            init() {
                const u = localStorage.getItem('khaos_user');
                if(u) this.success(Config.codes[u]);
            },
            login() {
                const u = document.getElementById('login-user').value;
                const p = document.getElementById('login-pass').value;
                if(Config.users[u] === p) { localStorage.setItem('khaos_user', u); this.success(Config.codes[u]); }
                else alert("Access Denied");
            },
            success(code) {
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('user-display').innerText = localStorage.getItem('khaos_user');
            },
            logout() { localStorage.removeItem('khaos_user'); location.reload(); }
        };

        const App = {
            addRow() {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td contenteditable="true">New Item</td><td contenteditable="true" style="text-align:center">1</td><td contenteditable="true" style="text-align:right">0</td>`;
                document.getElementById('item-list').appendChild(tr);
            }
        };

        const UI = {
            setTheme(name) { document.body.className = name === 'dark' ? 'theme-dark' : ''; }
        };

        window.onload = () => {
            Auth.init();
            setInterval(() => {
                const d = new Date();
                document.getElementById('live-clock').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                document.getElementById('bill-date').innerText = d.toLocaleDateString();
                document.getElementById('bill-time').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }, 1000);
        };
    </script>
</body>
</html>
